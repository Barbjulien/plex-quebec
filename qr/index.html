<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Plex Québec</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter Tight', sans-serif;
    background: #f7f7f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image: radial-gradient(rgba(28,28,26,0.025) 1px, transparent 1px);
    background-size: 3px 3px;
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 24px;
    color: #1c1c1a;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .qr-img {
    width: min(72vw, 320px);
    height: auto;
    border-radius: 12px;
  }
  .label {
    margin-top: 24px;
    font-size: 15px;
    color: #4a4a47;
    text-align: center;
    line-height: 1.5;
  }
  .url {
    margin-top: 8px;
    font-family: 'Fraunces', serif;
    font-size: 18px;
    color: #3a5c7a;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="logo">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="12" y="8" width="16" height="18" rx="3" fill="#3a5c7a" opacity="0.4"/><rect x="2" y="4" width="16" height="22" rx="3" fill="#3a5c7a"/></svg>
    Plex Québec
  </div>
  <img src="../qr-plexquebec.png" alt="QR code — plexquebec.com" class="qr-img" />
  <p class="label">Scannez pour visiter notre site</p>
  <p class="url">plexquebec.com</p>
</body>
</html>
