<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plex Québec — Business Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f1ea;
    --bg-warm: #ebe4d6;
    --ink: #1c1c1a;
    --ink-soft: #4a4a47;
    --accent: #8b3a2f;
    --accent-deep: #5e2820;
    --line: #d9cfbe;
    --paper: #fbf8f1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter Tight', sans-serif;
    background: #e0ddd6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 40px;
    padding: 40px 20px;
    -webkit-font-smoothing: antialiased;
  }

  .card-label {
    font-family: 'Inter Tight', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #888;
    margin-bottom: -28px;
  }

  /* Standard business card: 3.5 x 2 inches = 336 x 192 at 96dpi */
  /* Using 2x for sharpness: 672 x 384 */
  .card {
    width: 672px;
    height: 384px;
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.08);
  }

  /* ── FRONT ── */
  .card-front {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 40px 44px;
  }

  .card-front::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: radial-gradient(rgba(28,28,26,0.02) 1px, transparent 1px);
    background-size: 3px 3px;
    pointer-events: none;
  }

  .front-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 22px; height: 22px;
    background: var(--accent);
    clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
    flex-shrink: 0;
  }

  .logo-text {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 20px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  .front-tagline {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 11px;
    font-style: italic;
    color: var(--accent);
    letter-spacing: 0.02em;
    text-align: right;
    max-width: 16ch;
    line-height: 1.35;
  }

  .front-center {
    flex: 1;
    display: flex;
    align-items: center;
  }

  .front-headline {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 28px;
    line-height: 1.1;
    letter-spacing: -0.015em;
    color: var(--ink);
  }

  .front-headline em {
    font-style: italic;
    font-weight: 300;
    color: var(--accent);
  }

  .front-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .front-url {
    font-family: 'Inter Tight', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.02em;
  }

  .front-accent-line {
    width: 48px;
    height: 2px;
    background: var(--accent);
  }

  /* ── BACK ── */
  .card-back {
    background: var(--ink);
    color: var(--paper);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    padding: 40px 44px;
    align-items: center;
  }

  .back-left {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .back-logo {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 4px;
  }

  .back-logo .logo-mark {
    width: 18px; height: 18px;
  }

  .back-logo .logo-text {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 17px;
    color: var(--paper);
    letter-spacing: -0.01em;
  }

  .back-name {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 20px;
    color: var(--paper);
    line-height: 1.2;
  }

  .back-title {
    font-size: 12px;
    color: #a8a8a3;
    font-weight: 400;
    margin-top: 2px;
  }

  .back-contact {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .contact-line {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #c8c8c3;
  }

  .contact-line .cl-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    font-weight: 500;
    width: 52px;
    flex-shrink: 0;
  }

  .contact-line .cl-value {
    color: var(--paper);
    font-weight: 400;
  }

  .back-right {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .qr-box {
    width: 120px;
    height: 120px;
    background: #fff;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
  }

  .qr-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .qr-label {
    font-size: 10px;
    color: #7a7a76;
    letter-spacing: 0.06em;
    text-align: center;
  }

  /* ── PRINT ── */
  @media print {
    body { background: white; gap: 20px; padding: 10px; }
    .card { box-shadow: none; border: 0.5px solid #ccc; page-break-inside: avoid; }
    .card-label { display: none; }
  }
</style>
</head>

<div class="card-label">Front</div>
<div class="card card-front">
  <div class="front-top">
    <div class="logo">
      <span class="logo-mark"></span>
      <span class="logo-text">Plex Québec</span>
    </div>
    <div class="front-tagline">Acquisition d'immeubles à revenus</div>
  </div>

  <div class="front-center">
    <div class="front-headline">
      Vendez votre plex<br><em>simplement.</em>
    </div>
  </div>

  <div class="front-bottom">
    <div class="front-url">plexquebec.com</div>
    <div class="front-accent-line"></div>
  </div>
</div>

<div class="card-label">Back</div>
